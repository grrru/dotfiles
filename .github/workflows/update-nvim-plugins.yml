name: Update Neovim plugins

on:
  schedule:
    # Monday 03:17 KST. Avoid the start of the hour, when scheduled runs are busier.
    - cron: "17 18 * * 0"
  workflow_dispatch:

concurrency:
  group: update-nvim-plugins
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      changed: ${{ steps.update.outputs.changed }}
      lockfile: ${{ steps.update.outputs.lockfile }}
      source_sha: ${{ steps.update.outputs.source_sha }}
    env:
      CI: true
      NVIM_APPNAME: gruvim
      XDG_CONFIG_HOME: ${{ github.workspace }}

    steps:
      - name: Check out the default branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event.repository.default_branch }}

      - name: Install stable Neovim
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          asset="$(gh api repos/neovim/neovim/releases/tags/stable \
            --jq '.assets[] | select(.name == "nvim-linux-x86_64.tar.gz")')"
          url="$(jq -r '.browser_download_url' <<<"$asset")"
          checksum="$(jq -r '.digest' <<<"$asset")"
          checksum="${checksum#sha256:}"
          archive="$RUNNER_TEMP/nvim-linux-x86_64.tar.gz"

          curl --fail --location --retry 3 --output "$archive" "$url"
          printf '%s  %s\n' "$checksum" "$archive" | sha256sum --check -
          tar --extract --gzip --file "$archive" --directory "$RUNNER_TEMP"
          echo "$RUNNER_TEMP/nvim-linux-x86_64/bin" >>"$GITHUB_PATH"

      - name: Update the lazy.nvim lockfile
        id: update
        shell: bash
        env:
          XDG_CACHE_HOME: ${{ runner.temp }}/nvim/cache
          XDG_DATA_HOME: ${{ runner.temp }}/nvim/data
          XDG_STATE_HOME: ${{ runner.temp }}/nvim/state
        run: |
          mkdir -p "$XDG_CACHE_HOME" "$XDG_DATA_HOME" "$XDG_STATE_HOME"
          echo "source_sha=$(git rev-parse HEAD)" >>"$GITHUB_OUTPUT"
          nvim --headless \
            "+lua if vim.fn.exists(':Lazy') == 0 then vim.cmd('cquit 1') end" \
            "+Lazy! update" \
            +qa
          jq empty gruvim/lazy-lock.json

          if git diff --quiet -- gruvim/lazy-lock.json; then
            echo "changed=false" >>"$GITHUB_OUTPUT"
          else
            echo "changed=true" >>"$GITHUB_OUTPUT"
            echo "lockfile=$(base64 --wrap=0 gruvim/lazy-lock.json)" >>"$GITHUB_OUTPUT"
          fi

  pull-request:
    needs: update
    if: needs.update.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
      GH_TOKEN: ${{ github.token }}
      UPDATE_BRANCH: automation/update-nvim-plugins

    steps:
      - name: Check out the default branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ needs.update.outputs.source_sha }}

      - name: Apply the updated lockfile
        shell: bash
        env:
          LOCKFILE_BASE64: ${{ needs.update.outputs.lockfile }}
        run: |
          printf '%s' "$LOCKFILE_BASE64" | base64 --decode >gruvim/lazy-lock.json
          jq empty gruvim/lazy-lock.json

      - name: Open or update the pull request
        shell: bash
        run: |
          remote_ref="refs/remotes/origin/$UPDATE_BRANCH"
          branch_matches=false
          git switch --force-create "$UPDATE_BRANCH"
          git add gruvim/lazy-lock.json
          expected_tree="$(git write-tree)"

          if git fetch origin "$UPDATE_BRANCH:$remote_ref" 2>/dev/null \
            && [[ "$(git rev-parse "${remote_ref}^{tree}")" == "$expected_tree" ]]; then
            branch_matches=true
          fi

          if [[ "$branch_matches" == "false" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit --message "Update Neovim plugins"
            git push --force-with-lease origin "HEAD:refs/heads/$UPDATE_BRANCH"
          fi

          pr_number="$(gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --base "$DEFAULT_BRANCH" \
            --head "$UPDATE_BRANCH" \
            --state open \
            --json number \
            --jq '.[0].number')"

          if [[ -z "$pr_number" ]]; then
            gh pr create \
              --repo "$GITHUB_REPOSITORY" \
              --base "$DEFAULT_BRANCH" \
              --head "$UPDATE_BRANCH" \
              --title "Update Neovim plugins" \
              --body "Weekly lazy.nvim lockfile update generated by GitHub Actions."
          else
            echo "Updated pull request #$pr_number"
          fi
